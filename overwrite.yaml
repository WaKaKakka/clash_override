proxy-groups:
  - name: PROXY
    type: select
    include-all-proxies: true   # 自动包含所有 proxies 里的节点
    # 可选参数：
    # include-all: true         # 同时包含 proxies + proxy-providers
    # filter: "香港|HK|Hong Kong"   # 只包含匹配正则的节点
    # exclude-filter: "过期|测试"
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    timeout: 5000
    lazy: true

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - +.lan
    - +.local
    - time.*.com
    - ntp.*.com
    - +.market.xiaomi.com
    - +.msftconnecttest.com
  use-hosts: true
  respect-rules: true
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  nameserver-policy:
    rule-set:reject:
      - rcode://success
    rule-set:google,proxy,gfw,tld-not-cn:
      - https://1.1.1.1/dns-query
      - https://8.8.8.8/dns-query
    geosite:google,youtube,telegram,twitter,meta,geolocation-!cn:
      - https://1.1.1.1/dns-query
      - https://8.8.8.8/dns-query
    rule-set:apple,icloud,direct:
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
    geosite:apple,apple-cn,cn,bilibili,tencent,baidu,alibaba,bytedance:
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
    .cn:
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
    .mobi:
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query

rule-providers:
  reject:
    type: http
    behavior: domain
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt
    path: ./ruleset/reject.yaml
    interval: 86400
  icloud:
    type: http
    behavior: domain
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/icloud.txt
    path: ./ruleset/icloud.yaml
    interval: 86400
  apple:
    type: http
    behavior: domain
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/apple.txt
    path: ./ruleset/apple.yaml
    interval: 86400
  google:
    type: http
    behavior: domain
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/google.txt
    path: ./ruleset/google.yaml
